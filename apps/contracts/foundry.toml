[profile.default]
src        = "src"
out        = "out"
libs       = ["lib"]
solc       = "0.8.24"
optimizer  = true
optimizer_runs = 1_000_000
via_ir     = true

[rpc_endpoints]
base     = "${BASE_RPC_URL}"
ethereum = "${ETH_RPC_URL}"

[etherscan]
base     = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
ethereum = { key = "${ETHERSCAN_API_KEY}" }
